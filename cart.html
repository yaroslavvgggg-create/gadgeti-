<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина | TechStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>TechStore</h1>
            <nav>
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="about.html">О нас</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <h2>Ваша корзина</h2>
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Товар</th>
                        <th>Цена</th>
                        <th>Количество</th>
                        <th>Сумма</th>
                        <th></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <div class="cart-item">
                <img src="placeholder.jpg" alt="Наушники" width="60">
                <span>Беспроводные наушники TWS</span>
            </div>
        </td>
        <td>2 500 руб.</td>
        <td>
            <input type="number" value="1" min="1" max="10">
        </td>
        <td>2 500 руб.</td>
        <td><button class="remove">Удалить</button></td>
    </tr>
    <tr>
        <td colspan="3" class="total-label">Итого:</td>
        <td class="total-amount">2 500 руб.</td>
        <td></td>
    </tr>
</tbody>
</table>
<div class="cart-actions">
    <a href="catalog.html" class="btn btn-secondary">Продолжить покупки</a>
    <a href="#" class="btn">Оформить заказ</a>
</div>
</div>
</main>

<footer>
    <div class="container">
        <p>&copy; 2024 TechStore. Все права защищены.</p>
    </div>
</footer>
</body>
</html>
